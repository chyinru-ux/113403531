<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>作業 3 - CSS Layout</title>
    <style>
        /* 設定表格樣式 */
        table {
            border-collapse: collapse;
            width: 300px;
            margin: 50px;
        }
        
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        /* 表頭灰色背景，文字白色 */
        th {
            background-color: #666666;
            color: white;
        }

        /* 第 1、3 列黃色背景 */
        .yellow-bg {
            background-color: yellow;
        }

        /* 固定在右上角的 div */
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 3px solid #6B8E23; /* 橄欖綠邊框 */
            padding: 10px;
            background-color: white;
            font-family: serif;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr class="yellow-bg">
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr class="yellow-bg">
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
