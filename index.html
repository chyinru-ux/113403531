<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學生資料表格</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 5px;
            text-align: left;
        }

        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Student ID</th>
        </tr>
        <tr>
            <td>Your name</td>
            <td>Your student ID</td>
        </tr>
    </table>

</body>
</html>
